<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="420" viewBox="0 0 1040 420" font-family="Inter, Arial, sans-serif">
  <rect width="1040" height="420" fill="#ffffff"/>
  <!-- Swimlanes -->
  <rect x="20" y="30" width="1000" height="170" fill="#E8F4F0" stroke="#0C7D66"/>
  <rect x="20" y="30" width="26" height="170" fill="#0C7D66"/>
  <text x="33" y="120" fill="#ffffff" font-size="13" font-weight="700" transform="rotate(-90 33 120)" text-anchor="middle">Implementer</text>
  <rect x="20" y="200" width="1000" height="170" fill="#FBF3E6" stroke="#B8860B"/>
  <rect x="20" y="200" width="26" height="170" fill="#B8860B"/>
  <text x="33" y="285" fill="#ffffff" font-size="12" font-weight="700" transform="rotate(-90 33 285)" text-anchor="middle">ChiefDesigner</text>

  <!-- Implementer nodes -->
  <rect x="70" y="70" width="170" height="80" rx="8" fill="#ffffff" stroke="#0C7D66"/>
  <text x="155" y="100" text-anchor="middle" font-size="11" fill="#0C4A3E">Work done</text>
  <text x="155" y="116" text-anchor="middle" font-size="11" fill="#0C4A3E">(visual surface changed)</text>
  <text x="155" y="132" text-anchor="middle" font-size="11" fill="#0C4A3E">status: in_progress</text>

  <rect x="300" y="70" width="180" height="80" rx="8" fill="#0C7D66" stroke="#0A5C4C"/>
  <text x="390" y="100" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Hand off</text>
  <text x="390" y="116" text-anchor="middle" font-size="11" fill="#fff">assignee = ChiefDesigner</text>
  <text x="390" y="132" text-anchor="middle" font-size="11" fill="#fff">status = in_review</text>

  <!-- Decision -->
  <polygon points="610,70 690,110 610,150 530,110" fill="#FFF8E1" stroke="#B8860B"/>
  <text x="610" y="114" text-anchor="middle" font-size="12" fill="#7A5A00" font-weight="700">Verdict?</text>

  <rect x="840" y="70" width="150" height="80" rx="8" fill="#ffffff" stroke="#0C7D66"/>
  <text x="915" y="106" text-anchor="middle" font-size="11" fill="#0C4A3E">Continue to</text>
  <text x="915" y="122" text-anchor="middle" font-size="11" fill="#0C4A3E">done / merge</text>

  <!-- ChiefDesigner nodes -->
  <rect x="300" y="245" width="180" height="80" rx="8" fill="#ffffff" stroke="#B8860B"/>
  <text x="390" y="275" text-anchor="middle" font-size="11" fill="#7A5A00">Review surface</text>
  <text x="390" y="291" text-anchor="middle" font-size="11" fill="#7A5A00">(now assignee, can write)</text>
  <text x="390" y="307" text-anchor="middle" font-size="11" fill="#7A5A00">render visual truth</text>

  <rect x="560" y="245" width="200" height="80" rx="8" fill="#FBF3E6" stroke="#B8860B"/>
  <text x="660" y="280" text-anchor="middle" font-size="11" fill="#7A5A00" font-weight="700">Post verdict + evidence</text>
  <text x="660" y="296" text-anchor="middle" font-size="11" fill="#7A5A00">reassign to implementer</text>

  <!-- Arrows -->
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#444"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#0C7D66"/></marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#C0392B"/></marker>
  </defs>
  <line x1="240" y1="110" x2="298" y2="110" stroke="#0C7D66" stroke-width="2" marker-end="url(#g)"/>
  <path d="M390,150 L390,200 L390,243" fill="none" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="400" y="180" font-size="10" fill="#444">handoff</text>
  <line x1="480" y1="285" x2="558" y2="285" stroke="#B8860B" stroke-width="2" marker-end="url(#a)"/>
  <path d="M660,245 L660,200 L660,150 L692,128" fill="none" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <text x="670" y="180" font-size="10" fill="#444">reassign back</text>
  <line x1="690" y1="110" x2="838" y2="110" stroke="#0C7D66" stroke-width="2" marker-end="url(#g)"/>
  <text x="730" y="102" font-size="10" fill="#0C7D66" font-weight="700">PASS &#8594; in_review</text>
  <path d="M610,70 L610,40 L155,40 L155,68" fill="none" stroke="#C0392B" stroke-width="2" marker-end="url(#r)"/>
  <text x="360" y="34" font-size="10" fill="#C0392B" font-weight="700">CHANGES &#8594; in_progress (re-hand off)</text>
</svg>
